<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <title>Birthday Cake 🎂</title>

  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap"
    rel="stylesheet"
  />
</head>

<body class="cake-page">

<canvas id="confetti-canvas"></canvas>

<!-- Intro Screen -->
<div id="intro-screen">
  <div class="friend-section">
     <div class="friend-pic-back"></div>
    <img src="picture/Lagna.jpeg" class="friend-pic">
    <h2>Today is my bestie's birthday 🎉</h2>
  </div>

  <!-- Scrapbook surrounding pics -->
<div class="scrapbook-surround">
  <img src="picture/scrap/scrap1.jpeg" class="scrap-img s1">
  <img src="picture/scrap/scrap2.jpeg" class="scrap-img s2">
  <img src="picture/scrap/scrap3.jpeg" class="scrap-img s3">
  <img src="picture/scrap/scrap4.jpeg" class="scrap-img s4">
  <img src="picture/scrap/scrap5.jpeg" class="scrap-img s5">
  <img src="picture/scrap/scrap6.jpeg" class="scrap-img s6">
  <img src="picture/scrap/scrap7.jpeg" class="scrap-img s7">
  <img src="picture/scrap/scrap8.jpeg" class="scrap-img s8">
  <img src="picture/scrap/scrap9.jpeg" class="scrap-img s9">
  <img src="picture/scrap/scrap10.jpeg" class="scrap-img s10">

  <!-- Add more pictures as needed -->
</div>

  <div class="ribbon-section">
    <img src="picture/ribbon.jpg" id="ribbon">
    <p>Touch the butterfly cutie!</p>
  </div>
</div>

<!-- Cake Screen -->
<div id="cake-screen">
  <div class="container">
    <div id="birthdayText"></div>

    <div class="cake-container">
      <img src="picture/cake.gif" class="cake-image">
      <div class="cake" id="cake"></div>
    </div>
  </div>
</div>
  <audio id="bgMusic" src="sounds/birthday.mp3" preload="auto"></audio>
  <script src="cake.js"></script>
</body>
</html>
