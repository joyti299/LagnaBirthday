<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <title>Birthday Cake 🎂</title>

  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap"
    rel="stylesheet"
  />
</head>

<body class="cake-page">

<canvas id="confetti-canvas"></canvas>

<!-- Intro Screen -->
<div id="intro-screen">
  <div class="friend-section">
     <div class="friend-pic-back"></div>
    <img src="picture/Lagna.jpeg" class="friend-pic">
    <h2>Today is my bestie's birthday 🎉</h2>
  </div>

  <div class="ribbon-section">
    <img src="picture/ribbon.jpg" id="ribbon">
    <p>Touch the butterfly cutie!</p>
  </div>
</div>

<!-- Cake Screen -->
<div id="cake-screen" style="display:none;">
  <div class="container">
    <div id="birthdayText"></div>

    <div class="cake-container">
      <div class="cake" id="cake"></div>
    </div>
  </div>
</div>

  <script src="cake.js"></script>
</body>
</html>
